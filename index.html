<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yr365art | Texture Mixer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime:wght@400;700&display=swap');
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --bone: #d4c5a9;
    --void: #0a0a0c;
    --ash: #1a1a1f;
    --slate: #2a2d35;
    --mist: #8a8d96;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--void); color: var(--bone); font-family: "Courier Prime", monospace; min-height: 100vh; overflow-x: hidden; }

header {
padding: 1.5rem 2rem 1rem;
display: flex; justify-content: space-between; align-items: flex-end;
border-bottom: 1px solid rgba(201,168,76,0.15);
}
.logo { font-family: “Cormorant Garamond”, serif; font-size: clamp(1.2rem,3.5vw,1.8rem); font-weight: 300; letter-spacing: 0.08em; color: var(–gold); }
.logo span { color: var(–bone); opacity: 0.5; }
.subtitle { font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(–mist); opacity: 0.7; }

.workspace { display: grid; grid-template-columns: 1fr 290px; min-height: calc(100vh - 70px); }

.canvas-zone { position: relative; background: #050507; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; padding: 1.5rem; }
.canvas-zone::before, .canvas-zone::after {
content: “”; position: absolute; width: 50px; height: 50px;
border-color: rgba(201,168,76,0.2); border-style: solid; z-index: 6;
}
.canvas-zone::before { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
.canvas-zone::after  { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

#mixCanvas {
max-width: 520px; max-height: 520px;
width: min(520px, 85vw); height: min(520px, 85vw);
border: 1px solid rgba(201,168,76,0.12);
box-shadow: 0 0 80px rgba(0,0,0,0.8);
display: block;
}

.canvas-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
.btn {
font-family: “Courier Prime”, monospace; font-size: 0.62rem; letter-spacing: 0.18em;
text-transform: uppercase; padding: 0.5rem 1rem;
border: 1px solid rgba(201,168,76,0.3); background: rgba(10,10,12,0.8);
color: var(–gold); cursor: pointer; transition: all 0.2s ease;
}
.btn:hover { background: rgba(201,168,76,0.1); border-color: var(–gold); }
.btn-ghost { border-color: rgba(138,141,150,0.2); color: var(–mist); }
.btn-ghost:hover { border-color: var(–mist); color: var(–bone); background: rgba(138,141,150,0.05); }

.sidebar { border-left: 1px solid rgba(201,168,76,0.1); display: flex; flex-direction: column; overflow-y: auto; background: rgba(8,8,10,0.7); }
.sidebar::-webkit-scrollbar { width: 2px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); }

.sidebar-section { border-bottom: 1px solid rgba(255,255,255,0.04); padding: 1rem 1.25rem; }
.section-label { font-size: 0.57rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(–mist); margin-bottom: 0.75rem; opacity: 0.6; }

.thumb-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.3rem; }
.art-thumb {
aspect-ratio: 1; object-fit: cover; width: 100%;
border: 1px solid rgba(255,255,255,0.06); cursor: pointer;
transition: all 0.2s ease; filter: saturate(0.6) brightness(0.8);
}
.art-thumb:hover { filter: saturate(1) brightness(1); border-color: rgba(201,168,76,0.5); }
.art-thumb.selected { border-color: var(–gold); filter: saturate(1) brightness(1); box-shadow: 0 0 8px rgba(201,168,76,0.3); }

.slot-row { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
.slot-btn {
width: 44px; height: 44px; border: 1px solid rgba(201,168,76,0.2);
cursor: pointer; background: #0d0d10; position: relative;
overflow: hidden; transition: border-color 0.2s; flex-shrink: 0;
}
.slot-btn.active-slot { border-color: var(–gold); box-shadow: 0 0 8px rgba(201,168,76,0.25); }
.slot-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
.slot-label {
position: absolute; bottom: 0; left: 0; right: 0;
background: rgba(0,0,0,0.65); font-size: 0.42rem;
color: rgba(201,168,76,0.9); text-align: center; padding: 1px 0; letter-spacing: 0.1em;
}

.blend-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.3rem; }
.blend-btn {
font-family: “Courier Prime”, monospace; font-size: 0.5rem; letter-spacing: 0.08em;
text-transform: uppercase; padding: 0.35rem 0.1rem;
border: 1px solid rgba(255,255,255,0.07); background: transparent;
color: var(–mist); cursor: pointer; transition: all 0.15s ease; text-align: center;
}
.blend-btn:hover, .blend-btn.active { border-color: var(–gold); color: var(–gold); background: rgba(201,168,76,0.06); }

.layer-item { margin-bottom: 0.9rem; }
.layer-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
.vis-toggle {
width: 14px; height: 14px; border: 1px solid rgba(201,168,76,0.3);
background: transparent; cursor: pointer; flex-shrink: 0; position: relative; transition: all 0.2s;
}
.vis-toggle.on { background: rgba(201,168,76,0.15); border-color: var(–gold); }
.vis-toggle.on::after { content: “”; position: absolute; inset: 3px; background: var(–gold); }
.layer-name { font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(–bone); flex: 1; }
.layer-tag { font-size: 0.48rem; color: var(–mist); opacity: 0.5; }
.op-row { display: flex; align-items: center; gap: 0.5rem; }
.op-val { font-size: 0.52rem; color: var(–gold); width: 28px; text-align: right; flex-shrink: 0; }
input[type=“range”] { -webkit-appearance: none; flex: 1; height: 2px; background: rgba(255,255,255,0.08); outline: none; cursor: pointer; }
input[type=“range”]::-webkit-slider-thumb { -webkit-appearance: none; width: 9px; height: 9px; background: var(–gold); cursor: pointer; border-radius: 0; box-shadow: 0 0 5px rgba(201,168,76,0.5); }

.hint { font-size: 0.55rem; color: var(–mist); opacity: 0.4; line-height: 1.6; }

@media (max-width: 660px) {
.workspace { grid-template-columns: 1fr; }
.sidebar { border-left: none; border-top: 1px solid rgba(201,168,76,0.1); max-height: 60vh; }
}
</style>

</head>
<body>

<header>
  <div class="logo">yr365art <span>/</span> texture mixer</div>
  <div class="subtitle">layer &middot; blend &middot; compose</div>
</header>

<div class="workspace">
  <div class="canvas-zone">
    <canvas id="mixCanvas" width="520" height="520"></canvas>
    <div class="canvas-actions">
      <button class="btn btn-ghost" onclick="clearCanvas()">Clear</button>
      <button class="btn btn-ghost" onclick="shuffleMix()">Random Mix</button>
      <button class="btn" onclick="exportCanvas()">Export PNG</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Art Source &mdash; tap to assign</div>
      <div class="thumb-strip" id="thumbStrip"></div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Layer Slots</div>
      <div class="slot-row" id="slotRow"></div>
      <p class="hint">Select a slot, then tap a piece above.</p>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Blend Mode</div>
      <div class="blend-grid" id="blendGrid"></div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Opacity</div>
      <div id="layerSliders"></div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Tone Wash</div>
      <div class="blend-grid" id="toneGrid"></div>
    </div>
  </div>
</div>

const BLENDS = ["source-over","multiply","screen","overlay","hard-light","soft-light","color-burn","color-dodge","luminosity"];
const TONES = [
  { name: "None",  color: null },
  { name: "Gold",  color: "rgba(201,168,76,0.12)" },
  { name: "Ash",   color: "rgba(15,15,25,0.35)" },
  { name: "Bone",  color: "rgba(212,197,169,0.09)" },
  { name: "Ember", color: "rgba(140,30,15,0.1)" },
  { name: "Void",  color: "rgba(4,4,8,0.55)" },
];
const NUM = 4;

let layers = Array.from({length: NUM}, (_, i) => ({
  img: null, src: null, name: "", tag: "",
  opacity: i === 0 ? 1.0 : 0.65,
  blend: "source-over", visible: true
}));
let activeSlot = 0;
let activeTone = null;
let imgCache = {};

const canvas = document.getElementById("mixCanvas");
const ctx = canvas.getContext("2d");

function getImg(filename) {
  if (imgCache[filename]) return Promise.resolve(imgCache[filename]);
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => { imgCache[filename] = img; resolve(img); };
    img.onerror = () => resolve(null);
    img.src = IMAGE_DATA[filename];
  });
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#05050a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  layers.forEach(l => {
    if (!l.img || !l.visible) return;
    ctx.globalAlpha = l.opacity;
    ctx.globalCompositeOperation = l.blend;
    ctx.drawImage(l.img, 0, 0, canvas.width, canvas.height);
  });
  if (activeTone) {
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = activeTone;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = "source-over";
}

async function assignToSlot(artIdx) {
  const art = ARTWORKS[artIdx];
  const img = await getImg(art.file);
  if (!img) return;
  layers[activeSlot].img = img;
  layers[activeSlot].src = artIdx;
  layers[activeSlot].name = art.name;
  layers[activeSlot].tag = art.tag;
  document.querySelectorAll(".art-thumb").forEach((el, i) => el.classList.toggle("selected", i === artIdx));
  updateSlotImg(activeSlot, art.file);
  buildLayerSliders();
  render();
}

function setActiveSlot(i) {
  activeSlot = i;
  document.querySelectorAll(".slot-btn").forEach((el, j) => el.classList.toggle("active-slot", j === i));
  const l = layers[i];
  document.querySelectorAll(".art-thumb").forEach((el, j) => el.classList.toggle("selected", l.src === j));
  document.querySelectorAll(".blend-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === l.blend));
}

function updateSlotImg(i, filename) {
  const btn = document.getElementById("slot_" + i);
  if (!btn) return;
  let img = btn.querySelector("img");
  if (!img) { img = document.createElement("img"); btn.insertBefore(img, btn.firstChild); }
  img.src = IMAGE_DATA[filename];
  img.style.cssText = "width:100%;height:100%;object-fit:cover;display:block;";
}

function buildThumbs() {
  const strip = document.getElementById("thumbStrip");
  ARTWORKS.forEach((art, i) => {
    const img = document.createElement("img");
    img.className = "art-thumb";
    img.src = IMAGE_DATA[art.file];
    img.title = art.name + " / " + art.tag;
    img.onclick = () => assignToSlot(i);
    strip.appendChild(img);
  });
}

function buildSlots() {
  const row = document.getElementById("slotRow");
  for (let i = 0; i < NUM; i++) {
    const btn = document.createElement("div");
    btn.className = "slot-btn" + (i === 0 ? " active-slot" : "");
    btn.id = "slot_" + i;
    btn.innerHTML = '<div class="slot-label">L' + (i+1) + '</div>';
    btn.onclick = () => setActiveSlot(i);
    row.appendChild(btn);
  }
}

function buildBlendGrid() {
  const grid = document.getElementById("blendGrid");
  BLENDS.forEach(mode => {
    const btn = document.createElement("button");
    btn.className = "blend-btn" + (mode === "source-over" ? " active" : "");
    btn.dataset.mode = mode;
    btn.textContent = mode.replace("source-over","normal").replace("-"," ");
    btn.onclick = () => {
      layers[activeSlot].blend = mode;
      document.querySelectorAll(".blend-btn").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));
      render();
    };
    grid.appendChild(btn);
  });
}

function buildLayerSliders() {
  const c = document.getElementById("layerSliders");
  c.innerHTML = "";
  layers.forEach((l, i) => {
    const item = document.createElement("div");
    item.className = "layer-item";

    const hdr = document.createElement("div");
    hdr.className = "layer-header";

    const tog = document.createElement("div");
    tog.className = "vis-toggle" + (l.visible ? " on" : "");
    tog.onclick = () => { layers[i].visible = !layers[i].visible; tog.classList.toggle("on", layers[i].visible); render(); };

    const info = document.createElement("div");
    info.style.flex = "1";
    info.innerHTML = '<div class="layer-name">L' + (i+1) + " " + (l.name || "&mdash;") + '</div><div class="layer-tag">' + (l.tag || "empty") + "</div>";

    hdr.appendChild(tog);
    hdr.appendChild(info);

    const opRow = document.createElement("div");
    opRow.className = "op-row";

    const slider = document.createElement("input");
    slider.type = "range"; slider.min = 0; slider.max = 100;
    slider.value = Math.round(l.opacity * 100);

    const val = document.createElement("div");
    val.className = "op-val";
    val.textContent = slider.value + "%";

    slider.oninput = () => { layers[i].opacity = slider.value / 100; val.textContent = slider.value + "%"; render(); };

    opRow.appendChild(slider);
    opRow.appendChild(val);

    item.appendChild(hdr);
    item.appendChild(opRow);
    c.appendChild(item);
  });
}

function buildToneGrid() {
  const grid = document.getElementById("toneGrid");
  TONES.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "blend-btn" + (!t.color ? " active" : "");
    btn.textContent = t.name;
    if (t.color) btn.style.background = t.color.replace(/[\d.]+\)$/, "0.25)");
    btn.onclick = () => {
      activeTone = t.color;
      document.querySelectorAll("#toneGrid .blend-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    };
    grid.appendChild(btn);
  });
}

function clearCanvas() {
  layers.forEach(l => { l.img = null; l.src = null; l.name = ""; l.tag = ""; });
  activeTone = null;
  document.querySelectorAll(".art-thumb").forEach(el => el.classList.remove("selected"));
  document.querySelectorAll("#toneGrid .blend-btn").forEach((b, i) => b.classList.toggle("active", i === 0));
  for (let i = 0; i < NUM; i++) {
    const btn = document.getElementById("slot_" + i);
    if (btn) { const img = btn.querySelector("img"); if (img) img.remove(); }
  }
  buildLayerSliders();
  render();
}

async function shuffleMix() {
  const pool = [...Array(ARTWORKS.length).keys()];
  const blends = ["source-over","overlay","multiply","screen","soft-light"];
  for (let i = 0; i < NUM; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    const artIdx = pool.splice(idx, 1)[0];
    const art = ARTWORKS[artIdx];
    const img = await getImg(art.file);
    layers[i].img = img;
    layers[i].src = artIdx;
    layers[i].name = art.name;
    layers[i].tag = art.tag;
    layers[i].visible = true;
    layers[i].blend = i === 0 ? "source-over" : blends[Math.floor(Math.random() * blends.length)];
    layers[i].opacity = i === 0 ? 1.0 : 0.4 + Math.random() * 0.45;
    updateSlotImg(i, art.file);
  }
  activeTone = TONES[Math.floor(Math.random() * TONES.length)].color;
  document.querySelectorAll("#toneGrid .blend-btn").forEach((b, i) => b.classList.toggle("active", TONES[i].color === activeTone));
  buildLayerSliders();
  render();
}

function exportCanvas() {
  const a = document.createElement("a");
  a.download = "yr365art-mix.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
}

buildThumbs();
buildSlots();
buildBlendGrid();
buildLayerSliders();
buildToneGrid();
render();
</script>
